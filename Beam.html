<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEMP - Advanced Server Verification</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        }

        :root {
            --primary: #7289da;
            --primary-dark: #677bc4;
            --secondary: #43b581;
            --secondary-dark: #3ca374;
            --background: #36393f;
            --surface: #2f3136;
            --surface-light: #424549;
            --surface-lighter: #36393f;
            --text-primary: #dcddde;
            --text-secondary: #b9bbbe;
            --text-muted: #72767d;
            --danger: #f04747;
            --warning: #faa61a;
            --success: #43b581;
            --info: #17a2b8;
            --blurple: #5865F2;
        }

        body {
            background-color: var(--background);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .bg-animation::before {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(114, 137, 218, 0.1) 0%, rgba(47, 49, 54, 0) 70%);
            animation: rotate 30s linear infinite;
        }

        .bg-animation::after {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(67, 181, 129, 0.05) 0%, rgba(47, 49, 54, 0) 70%);
            animation: rotate 40s linear infinite reverse;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .container {
            width: 100%;
            max-width: 550px;
            background-color: var(--surface);
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            overflow: hidden;
            transform: translateY(0);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            z-index: 10;
        }

        .container:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.5);
        }

        .header {
            background: linear-gradient(135deg, var(--blurple) 0%, var(--primary) 100%);
            padding: 25px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0) 70%);
            animation: rotate 20s linear infinite;
        }

        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #fff 0%, rgba(255, 255, 255, 0.8) 100%);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px;
            font-size: 36px;
            font-weight: bold;
            color: var(--blurple);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            position: relative;
            z-index: 1;
            animation: pulse 2s ease infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .server-info {
            position: relative;
            z-index: 1;
        }

        .server-icon {
            width: 70px;
            height: 70px;
            border-radius: 20px;
            background: linear-gradient(135deg, var(--secondary) 0%, var(--success) 100%);
            margin: 0 auto 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            font-weight: bold;
            color: white;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .server-name {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 5px;
            color: white;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .server-members {
            color: rgba(255, 255, 255, 0.8);
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .server-members i {
            margin-right: 5px;
            font-size: 14px;
        }

        .content {
            padding: 30px;
            text-align: center;
        }

        .verification-message {
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .verification-message h2 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 15px;
            color: var(--text-primary);
        }

        .verification-message p {
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        .steps {
            display: flex;
            justify-content: space-between;
            margin: 30px 0;
            position: relative;
        }

        .steps::before {
            content: "";
            position: absolute;
            top: 20px;
            left: 50px;
            right: 50px;
            height: 2px;
            background-color: var(--surface-light);
            z-index: 1;
        }

        .step {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 2;
            transition: transform 0.3s ease;
        }

        .step:hover {
            transform: translateY(-5px);
        }

        .step-number {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--surface-light);
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 10px;
            font-weight: bold;
            color: var(--text-muted);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .step.active .step-number {
            background: linear-gradient(135deg, var(--blurple) 0%, var(--primary) 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(114, 137, 218, 0.4);
        }

        .step.completed .step-number {
            background: linear-gradient(135deg, var(--success) 0%, var(--secondary) 100%);
            color: white;
        }

        .step-text {
            font-size: 14px;
            color: var(--text-muted);
            transition: color 0.3s ease;
        }

        .step.active .step-text {
            color: var(--text-primary);
            font-weight: 600;
        }

        .step.completed .step-text {
            color: var(--success);
        }

        .verify-button, .continue-button {
            background: linear-gradient(135deg, var(--blurple) 0%, var(--primary) 100%);
            color: white;
